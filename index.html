<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GIRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A11;--surface:#15141F;--surface2:#1E1C2B;
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.14);
  --tx:#F4F2FA;--mut:#A29FB6;--mut2:#6F6C82;
  --pink:#FF2E8B;--violet:#7A5CFF;--cyan:#2EE6D6;--red:#FF4D4D;
  --disp:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;
  --bs:min(86vw,54vh); --bs:min(86vw,54dvh);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--body);color:var(--tx);
  background:radial-gradient(1000px 500px at 50% -8%, #1a1430 0%, var(--bg) 55%);overflow:hidden}
#app{max-width:460px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;
  padding:clamp(10px,2.4vh,22px) 16px calc(env(safe-area-inset-bottom) + 14px);overflow-y:auto;overflow-x:hidden}
.screen{display:none;flex:1;min-height:0;flex-direction:column}
.screen.on{display:flex}
h1{font-family:var(--disp);font-weight:800;letter-spacing:-.5px}
.logo{font-family:var(--disp);font-weight:800;font-size:clamp(32px,8.5vw,46px);letter-spacing:-1px;text-align:center;
  background:linear-gradient(92deg,var(--violet),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent}
.tag{text-align:center;color:var(--mut);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.label{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut2);margin-bottom:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:16px;
  font-family:var(--disp);font-weight:600;font-size:16px;border:none;cursor:pointer;color:#fff;
  background:linear-gradient(92deg,var(--violet),var(--pink));box-shadow:0 8px 24px -6px rgba(255,46,139,.5)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;color:var(--tx);border:1px solid var(--line2);box-shadow:none}
.btn:disabled{opacity:.4}

/* SETUP */
.seg{display:flex;background:var(--surface2);border-radius:14px;padding:4px;border:1px solid var(--line)}
.seg button{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:500;color:var(--mut);
  background:transparent;font-family:var(--body);cursor:pointer}
.seg button.on{background:linear-gradient(92deg,rgba(122,92,255,.95),rgba(255,46,139,.95));color:#fff}
.vibes{display:flex;gap:8px}
.vibe{flex:1;border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;background:var(--surface2);cursor:pointer}
.vibe .em{font-size:22px}.vibe .nm{font-size:12px;margin-top:6px;color:var(--mut)}
.vibe.on{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink)}.vibe.on .nm{color:var(--tx)}
.prow{display:flex;gap:8px}
.prow input{flex:1;background:var(--surface2);border:1px solid var(--line);border-radius:12px;color:var(--tx);
  padding:12px;font-family:var(--body);font-size:15px}
.prow input:focus{outline:none;border-color:var(--violet)}
.iadd{width:48px;flex:0 0 48px;border-radius:12px;border:1px solid var(--line2);background:var(--surface2);color:var(--tx);font-size:20px;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.chip{display:flex;align-items:center;gap:7px;padding:8px 10px 8px 13px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);font-size:13px}
.chip b{color:var(--mut2);cursor:pointer;font-weight:400;font-size:15px}

/* GAME */
.ghead{display:flex;justify-content:space-between;align-items:center;gap:8px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:500;
  border:1px solid var(--line2);color:var(--mut);background:var(--surface2);cursor:pointer}
.heat{margin-top:16px}
.heatbar{height:10px;border-radius:999px;background:var(--surface2);overflow:hidden;border:1px solid var(--line)}
.heatfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--violet),var(--pink) 60%,var(--red));
  transition:width .5s ease;box-shadow:0 0 16px rgba(255,46,139,.6)}
.heatrow{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:6px}
.ghead,.heat,.pbar{flex-shrink:0}
.gmain{flex:1;min-height:0;width:100%;display:flex;flex-direction:column;justify-content:space-evenly;align-items:center;gap:8px}
#board{position:relative;width:var(--bs);height:var(--bs);margin:0}
.track{position:absolute;inset:14px;border-radius:50%;border:1px dashed var(--line2)}
.tile{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:1px solid;background:var(--surface2);font-size:13px;transition:all .25s ease}
.tile.here{font-size:17px;z-index:2}
.bc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:3px;pointer-events:none}
.bc .big{font-family:var(--disp);font-weight:800;font-size:22px}
.bc .sub{font-size:12px;color:var(--mut)}
.center{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:12px;padding-top:2px}
.who{font-family:var(--disp);font-weight:800;font-size:clamp(18px,5vw,24px);text-align:center}
.who small{display:block;font-family:var(--body);font-weight:500;font-size:12px;color:var(--mut);letter-spacing:1px;text-transform:uppercase}
.die{width:clamp(72px,19vw,90px);height:clamp(72px,19vw,90px);border-radius:22px;background:var(--surface2);border:1px solid var(--line2);
  display:grid;grid-template-columns:repeat(3,1fr);padding:14px;gap:5px;box-shadow:0 0 26px -8px rgba(122,92,255,.6)}
.die.roll{animation:tumble .45s ease-in-out infinite}
@keyframes tumble{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.14)}100%{transform:rotate(360deg) scale(1)}}
.pip{align-self:center;justify-self:center;width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff,var(--cyan));box-shadow:0 0 8px var(--cyan)}
.pip.off{background:transparent;box-shadow:none}

/* OVERLAY CARD */
#overlay{position:absolute;inset:0;background:rgba(5,4,12,.78);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:22px;z-index:20}
#overlay.show{display:flex;animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.card{--cc:var(--pink);width:100%;max-width:400px;border-radius:26px;padding:clamp(18px,5vw,24px);min-height:min(58dvh,440px);display:flex;flex-direction:column;
  background:linear-gradient(180deg,color-mix(in srgb,var(--cc) 18%,var(--surface2)),var(--surface2) 45%);
  border:1px solid color-mix(in srgb,var(--cc) 55%,transparent);
  box-shadow:0 0 50px -14px var(--cc);animation:pop .25s ease}
@keyframes pop{from{transform:scale(.94);opacity:.4}to{transform:scale(1);opacity:1}}
.cat{align-self:flex-start;padding:7px 13px;border-radius:999px;font-family:var(--disp);font-weight:600;font-size:13px;
  color:var(--cc);background:color-mix(in srgb,var(--cc) 18%,transparent);border:1px solid color-mix(in srgb,var(--cc) 50%,transparent)}
.dots{display:flex;gap:5px;margin-top:14px}
.dots span{width:20px;height:5px;border-radius:3px;background:rgba(255,255,255,.14)}
.dots span.on{background:var(--cc);box-shadow:0 0 8px var(--cc)}
.ctext{font-family:var(--disp);font-weight:800;font-size:clamp(20px,6.2vw,28px);line-height:1.18;margin:auto 0;letter-spacing:-.5px}
.pen{font-size:13px;color:var(--mut);display:flex;gap:7px;margin-bottom:14px}.pen b{color:var(--red);font-weight:600}
.cbtns{display:flex;gap:10px;flex-wrap:wrap}.cbtns .btn{flex:1;min-width:120px;font-size:15px;padding:14px}

/* RECAP */
.rrow{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:14px;
  background:var(--surface2);border:1px solid var(--line);margin-bottom:8px}
.rrow .n{font-family:var(--disp);font-weight:600}.rrow .s{color:var(--pink);font-weight:600}
.rrow.first{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink)}
.tmr{margin:14px 0;text-align:center;display:none}
.tnum{font-family:var(--disp);font-weight:800;font-size:54px;line-height:1;color:var(--cc);text-shadow:0 0 20px var(--cc)}
.tnum.warn{color:var(--red);text-shadow:0 0 20px var(--red);animation:tpulse .5s ease infinite}
@keyframes tpulse{50%{transform:scale(1.12)}}
.tstart{margin:10px auto 0;max-width:200px}
.cft{position:absolute;top:-12px;width:8px;height:12px;border-radius:2px;z-index:25;animation:fall 1.5s ease-in forwards}
@keyframes fall{to{transform:translateY(120vh) rotate(540deg);opacity:.2}}
.flash{position:absolute;inset:0;z-index:30;pointer-events:none;animation:flf .4s ease-out forwards}
@keyframes flf{0%{opacity:.55}100%{opacity:0}}
#heatglow{position:absolute;inset:0;z-index:0;pointer-events:none;transition:background .6s ease}
.screen{position:relative;z-index:1}
.heat{position:relative}
.htoast{position:absolute;right:4px;top:-4px;color:var(--pink);font-weight:600;font-size:13px;pointer-events:none;animation:htf .9s ease-out forwards}
@keyframes htf{to{transform:translateY(-20px);opacity:0}}
.pedina{position:absolute;width:18px;height:18px;border-radius:50%;z-index:5;
  background:radial-gradient(circle at 35% 30%,#fff,var(--cyan));box-shadow:0 0 14px var(--cyan),0 0 4px #fff;
  transition:left .16s linear,top .16s linear;animation:ppulse 1.5s ease-in-out infinite}
@keyframes ppulse{50%{box-shadow:0 0 24px var(--cyan),0 0 7px #fff}}
.pbar{display:flex;gap:8px;overflow-x:auto;padding:12px 0 2px;-webkit-overflow-scrolling:touch}
.pbar::-webkit-scrollbar{display:none}
.pchip{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:12px;background:var(--surface2);border:1px solid var(--line)}
.pchip.cur{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan);background:#202a36}
.pchip .pr{font-family:var(--disp);font-weight:700;font-size:12px;color:var(--mut2);min-width:12px}
.pchip .pn{font-size:13px;color:#D7D5E2;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pchip .ps{font-family:var(--disp);font-weight:700;font-size:14px;color:var(--pink);white-space:nowrap}
</style>
</head>

    </div>
    <div class="center">

      <div class="die" id="die"></div>
      <button class="btn" id="rollBtn" onclick="roll()" style="max-width:240px">Tira il dado</button>
    </div>
    </div>
  </section>

  <!-- RECAP -->
  <section class="screen" id="recap">
    <h1 style="font-size:30px;margin-bottom:4px">Fine serata</h1>
    <p style="color:var(--mut);font-size:14px;margin-bottom:20px">Chi ha bevuto di più stasera.</p>
    <div id="rlist" style="flex:1;overflow:auto"></div>
    <button class="btn" onclick="reset()">Nuova partita</button>
  </section>

  <!-- CARD OVERLAY -->
  <div id="overlay"><div class="card">
    <span class="cat"></span>
    <div class="dots"></div>
    <p class="ctext"></p>
    <div class="tmr"></div>
    <p class="pen"></p>
    <div class="cbtns"></div>
  </div></div>
