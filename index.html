<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Game - The Ultimate Deck</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a24;
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --primary: #ff3e6c;
            
            /* Categorie colors */
            --cat-scomode: #ff2a5f;
            --cat-piccanti: #ff5e00;
            --cat-sfide: #8a2be2;
            --cat-tempo: #00bfff;
            --cat-trivia: #2ed573;
            --cat-classici: #ffa500;
            --cat-bonus: #1e90ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: min-content;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-top: 10px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff3e6c, #ff5e00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Schermata di Setup */
        .setup-panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2a3a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .setup-panel h3 {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .vibe-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .vibe-btn {
            background: #252535;
            border: 2px solid transparent;
            color: var(--text-muted);
            padding: 12px 5px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            text-align: center;
        }

        .vibe-btn.active {
            background: rgba(255, 62, 108, 0.15);
            border-color: var(--primary);
            color: #fff;
        }

        .start-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff3e6c, #ff5e00);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 62, 108, 0.4);
            transition: transform 0.1s ease;
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        /* Schermata Gioco */
        .game-panel {
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px 24px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            border: 1px solid #2a2a3a;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .heat-container {
            display: flex;
            gap: 3px;
        }

        .fire-icon {
            color: #555565;
            font-size: 1.1rem;
        }

        .fire-icon.active {
            color: #ff5e00;
        }

        .card-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .card-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .target-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #222232;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--cat-tempo);
            font-variant-numeric: tabular-nums;
            margin: 10px 0;
            display: none;
        }

        .trivia-answer {
            background: #222232;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            border: 1px dashed #44445c;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .trivia-answer span {
            filter: blur(5px);
            transition: filter 0.2s ease;
        }

        .trivia-answer.revealed span {
            filter: blur(0);
        }

        .card-footer {
            width: 100%;
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        .penalty-badge {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4d4d;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Regole di Gruppo Attive */
        .rules-panel {
            background: #15151f;
            border-radius: 16px;
            padding: 15px;
            border: 1px solid #222232;
            display: none;
        }

        .rules-panel h4 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .rule-item {
            font-size: 0.95rem;
            color: #ffa500;
            font-weight: 500;
            background: rgba(255, 165, 0, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            border-left: 3px solid #ffa500;
        }

        /* Controlli Gioco */
        .controls {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn-secondary {
            background: #252535;
            border: 1px solid #3a3a4a;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-main {
            flex-grow: 1;
            background: linear-gradient(135deg, #00bfff, #8a2be2);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        .btn-main:disabled {
            background: #333;
            color: #666;
            box-shadow: none;
            cursor: not-allowed;
        }

        .counter-tokens {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>

        let activeVibes = ['misto'];
        let currentDeck = [];
        let timerInterval = null;

        function toggleVibe(vibe) {
            const btn = event.target;
            if (activeVibes.includes(vibe)) {
                if (activeVibes.length > 1) {
                    activeVibes = activeVibes.filter(v => v !== vibe);
                    btn.classList.remove('active');
                }
            } else {
                activeVibes.push(vibe);
                btn.classList.add('active');
            }
        }

        function startGame() {
            // Filtra il mazzo in base ai Vibe selezionati
            currentDeck = DECK.filter(card => {
                return card.vibe.some(v => activeVibes.includes(v));
            });

            // Mischia il mazzo (Shuffle algoritmo Fisher-Yates)
            for (let i = currentDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
            }

            document.getElementById('setupPanel').style.display = 'none';
            document.getElementById('gamePanel').style.display = 'flex';
            
            updateCounter();
            nextCard();
        }

        function nextCard() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('timerDisplay').style.display = 'none';
            document.getElementById('triviaBox').style.display = 'none';
            document.getElementById('triviaBox').classList.remove('revealed');

            if (currentDeck.length === 0) {
                document.getElementById('cardText').innerText = "Mazzo terminato! Clicca Reset per rigiocare con questo o altri Vibe.";
                document.getElementById('cardCategory').innerText = "Fine";
                document.getElementById('cardTarget').innerText = "-";
                document.getElementById('cardHeat').innerHTML = "";
                document.getElementById('cardPenalty').innerText = "Sorsi: 0";
                document.getElementById('nextBtn').disabled = true;
                return;
            }

            const card = currentDeck.pop();
            updateCounter();

            // Render dei dati sulla carta
            document.getElementById('cardText').innerText = card.testo;
            document.getElementById('cardCategory').innerText = card.cat;
            document.getElementById('cardCategory').style.backgroundColor = `var(--cat-${card.cat})`;
            document.getElementById('cardTarget').innerText = card.target;
            
            // Gestione Sorsi / Penalità
            if(card.pen > 0) {
                document.getElementById('cardFooter').style.display = 'flex';
                document.getElementById('cardPenalty').innerText = `Penalità: ${card.pen} Sorsi`;
            } else {
                document.getElementById('cardFooter').style.display = 'none';
            }

            // Render Fuochi (Heat Level)
            let heatHtml = '';
            for (let i = 1; i <= 4; i++) {
                heatHtml += `<span class="fire-icon ${i <= card.heat ? 'active' : ''}">🔥</span>`;
            }
            document.getElementById('cardHeat').innerHTML = heatHtml;

            // Cambia colore bordo in base all'intensità (Heat)
            const cardContainer = document.getElementById('cardContainer');
            if(card.heat >= 4) {
                cardContainer.style.borderColor = '#ff2a5f';
                cardContainer.style.boxShadow = '0 15px 35px rgba(255, 42, 95, 0.2)';
            } else {
                cardContainer.style.borderColor = '#2a2a3a';
                cardContainer.style.boxShadow = '0 15px 35px rgba(0,0,0,0.6)';
            }

            // Se è una carta a Tempo / Timer superiore a zero
            if (card.timer > 0) {
                initTimer(card.timer);
            }

            // Se è una Trivia
            if (card.tipo === 'trivia' && card.risp !== '') {
                document.getElementById('triviaBox').style.display = 'block';
                document.getElementById('triviaAnswer').innerText = card.risp;
            }

            // Gestione Regole Attive nel gruppo (Es. cls_05 o cls_08)
            const rulesPanel = document.getElementById('rulesPanel');
            if (card.regola !== '') {
                rulesPanel.style.display = 'block';
                document.getElementById('ruleText').innerText = card.regola;
            } else {
                // Lasciamo l'ultima regola visibile o la nascondiamo a seconda delle preferenze. 
                // Di solito nei drinking games le regole durano finché non ne esce un'altra.
            }
        }

        function initTimer(seconds) {
            const display = document.getElementById('timerDisplay');
            display.style.display = 'block';
            display.innerText = seconds;
            display.style.color = 'var(--cat-tempo)';

            timerInterval = setInterval(() => {
                seconds--;
                display.innerText = seconds;

                if (seconds <= 5) {
                    display.style.color = '#ff2a5f'; // Lampeggia o diventa rosso alla fine
                }

                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    display.innerText = "TEMPO SCADUTO!";
                }
            }, 1000);
        }

        function revealTrivia() {
            document.getElementById('triviaBox').classList.add('revealed');
        }

        function updateCounter() {
            document.getElementById('deckCounter').innerText = `Carte rimanenti nel mazzo: ${currentDeck.length}`;
        }

        function resetGame() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('setupPanel').style.display = 'block';
            document.getElementById('gamePanel').style.display = 'none';
            document.getElementById('rulesPanel').style.display = 'none';
            document.getElementById('nextBtn').disabled = false;
        }
    </script>
